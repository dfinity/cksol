canisters:
  - name: cksol_minter
    recipe:
      type: "@dfinity/rust@latest"
      configuration:
        package: cksol_minter
        candid: minter/cksol_minter.did
        shrink: true
        compress: true

  - name: cksol_ledger
    build:
      steps:
        - type: script
          commands:
            - "curl -fsSL -o ${ICP_WASM_OUTPUT_PATH} https://github.com/dfinity/ic/releases/download/ledger-suite-icrc-2026-02-02/ic-icrc1-ledger.wasm.gz"

  - name: cksol_index
    build:
      steps:
        - type: script
          commands:
            - "curl -fsSL -o ${ICP_WASM_OUTPUT_PATH} https://github.com/dfinity/ic/releases/download/ledger-suite-icrc-2026-02-02/ic-icrc1-index-ng.wasm.gz"

environments:
  - name: staging
    network: ic
    canisters: [cksol_minter, cksol_ledger, cksol_index]

  - name: prod
    network: ic
    canisters: [cksol_minter, cksol_ledger, cksol_index]
