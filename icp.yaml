canisters:
  - name: cksol_minter
    recipe:
      type: "@dfinity/rust@latest"
      configuration:
        package: cksol_minter
        candid: minter/cksol_minter.did
        shrink: true
        compress: true

  - name: cksol_ledger
    build:
      steps:
        - type: script
          commands:
            - "curl -fsSL -o ${ICP_WASM_OUTPUT_PATH} https://github.com/dfinity/ic/releases/download/ledger-suite-icrc-2026-02-02/ic-icrc1-ledger.wasm.gz"

environments:
  - name: staging
    network: ic
    canisters: [cksol_minter, cksol_ledger]
    init_args:
      cksol_minter: |
        (variant {
          Init = record {
            sol_rpc_canister_id = principal "tghme-zyaaa-aaaar-qarca-cai";
            ledger_canister_id = principal "la34w-haaaa-aaaar-qb5na-cai";
            master_key_name = variant { MainnetProdKey1 };
            solana_network = variant { Devnet };
            manual_deposit_fee = 10_000 : nat64;
            automated_deposit_fee = 10_000_000 : nat64;
            deposit_consolidation_fee = 50_000_000_000 : nat64;
            minimum_deposit_amount = 20_000_000 : nat64;
            minimum_withdrawal_amount = 2_000_000 : nat64;
            withdrawal_fee = 1_000_000 : nat64;
            process_deposit_required_cycles = 1_000_000_000_000 : nat64;
          }
        })
      cksol_ledger: |
        (variant {
          Init = record {
            minting_account = record {
              owner = principal "ljyxk-riaaa-aaaar-qb5mq-cai";
              subaccount = null;
            };
            fee_collector_account = opt record {
              owner = principal "ljyxk-riaaa-aaaar-qb5mq-cai";
              subaccount = opt blob "\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\00\0f\ee";
            };
            initial_balances = vec {};
            transfer_fee = 50 : nat;
            decimals = opt (9 : nat8);
            token_name = "ckDevnetSOL";
            token_symbol = "ckDevnetSOL";
            metadata = vec {
              record { "icrc1:logo"; variant { Text = "data:image/svg+xml;base64," } };
            };
            archive_options = record {
              trigger_threshold = 1_000_000_000 : nat64;
              num_blocks_to_archive = 10_000 : nat64;
              node_max_memory_size_bytes = opt (3_221_225_472 : nat64);
              max_message_size_bytes = null;
              controller_id = principal "r7inp-6aaaa-aaaaa-aaabq-cai";
              more_controller_ids = null;
              cycles_for_archive_creation = opt (100_000_000_000_000 : nat64);
              max_transactions_per_response = null;
            };
            max_memo_length = opt (80 : nat16);
            feature_flags = opt record { icrc2 = true };
            index_principal = null;
          }
        })

  - name: prod
    network: ic
    canisters: [cksol_minter, cksol_ledger]
